<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leslie Hunt—Content Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #F5F0E8;
      --ink: #1A1A18;
      --forest: #1D4D2E;
      --carrot: #E8651A;
      --gold: #D4A847;
      --warm-white: #FDFAF4;
      --muted: #6B6558;
      --border: #D9D2C5;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 3rem;
      background: rgba(245, 240, 232, 0.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--carrot); }

    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding-top: 5rem;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 6rem 4rem 6rem 5rem;
      position: relative;
    }

    .hero-eyebrow {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--carrot);
      margin-bottom: 1.5rem;
    }

    .hero-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 5vw, 5.5rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 2rem;
    }

    .hero-headline em {
      font-style: italic;
      color: var(--forest);
    }

    .hero-sub {
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--muted);
      max-width: 420px;
      margin-bottom: 3rem;
    }

    .hero-sub strong {
      color: var(--ink);
      font-weight: 500;
    }

    .hero-ctas {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      border-radius: 2px;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--forest);
      color: var(--warm-white);
      border: 2px solid var(--forest);
    }

    .btn-primary:hover {
      background: var(--carrot);
      border-color: var(--carrot);
    }

    .btn-secondary {
      background: transparent;
      color: var(--ink);
      border: 2px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--ink);
    }

    .hero-right {
      position: relative;
      background: var(--forest);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }

    .hero-right-inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4rem 3rem;
      position: relative;
    }

    .hero-stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      width: 100%;
      max-width: 420px;
    }

    .hero-stat {
      background: rgba(255,255,255,0.06);
      padding: 2rem 1.5rem;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hero-stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .hero-stat-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.4;
    }

    .hero-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.5);
      margin-top: 2.5rem;
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
    }

    .marquee-strip {
      background: var(--carrot);
      padding: 0.9rem 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .marquee-inner {
      display: inline-block;
      animation: marquee 22s linear infinite;
    }

    .marquee-inner span {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warm-white);
      margin-right: 3rem;
    }

    .marquee-inner span::before {
      content: '✦';
      margin-right: 3rem;
      opacity: 0.6;
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    section { padding: 7rem 5rem; }

    .section-eyebrow {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--carrot);
      margin-bottom: 1rem;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3.5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }

    .section-title em {
      font-style: italic;
      color: var(--forest);
    }

    .about {
      background: var(--warm-white);
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 6rem;
      align-items: center;
    }

    .about-body {
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--muted);
    }

    .about-body p + p { margin-top: 1.2rem; }

    .about-body strong {
      color: var(--ink);
      font-weight: 500;
    }

    .skills-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-top: 2.5rem;
    }

    .skill-item {
      display: flex;
      align-items: flex-start;
      gap: 1.2rem;
      padding: 1.5rem;
      border: 1px solid var(--border);
      background: var(--cream);
      transition: border-color 0.2s, transform 0.2s;
    }

    .skill-item:hover {
      border-color: var(--forest);
      transform: translateX(4px);
    }

    .skill-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    .skill-name {
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }

    .skill-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .work { background: var(--cream); }

    .work-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 4rem;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 6rem;
    }

    .project-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }

    .project-card.reverse { direction: rtl; }
    .project-card.reverse > * { direction: ltr; }

    .project-visual {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--warm-white);
    }

    .project-visual img {
      width: 100%;
      height: 420px;
      object-fit: contain;
      object-position: center;
      display: block;
      transition: transform 0.5s ease;
      background: var(--warm-white);
    }

    .project-visual:hover img { transform: scale(1.03); }

    .project-tag {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: var(--forest);
      color: var(--warm-white);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 0.75rem;
    }

    .project-info { padding: 1rem 0; }

    .project-number {
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
      color: var(--border);
      margin-bottom: -0.5rem;
    }

    .project-company {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--carrot);
      margin-bottom: 0.75rem;
    }

    .project-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 2.5vw, 2.2rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 1.2rem;
    }

    .project-desc {
      font-size: 0.97rem;
      line-height: 1.8;
      color: var(--muted);
      margin-bottom: 1.8rem;
    }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .experience {
      background: var(--forest);
      color: var(--warm-white);
    }

    .experience .section-title { color: var(--warm-white); }
    .experience .section-title em { color: var(--gold); }

    .exp-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      margin-top: 4rem;
    }

    .exp-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 2.5rem 2rem;
      transition: background 0.2s;
    }

    .exp-card:hover { background: rgba(255,255,255,0.09); }

    .exp-company {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.6rem;
    }

    .exp-role {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--warm-white);
      margin-bottom: 0.4rem;
      line-height: 1.2;
    }

    .exp-years {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 1.2rem;
    }

    .exp-desc {
      font-size: 0.88rem;
      line-height: 1.75;
      color: rgba(255,255,255,0.6);
    }

    .contact {
      background: var(--ink);
      text-align: center;
      padding: 8rem 5rem;
    }

    .contact .section-eyebrow { color: var(--gold); }

    .contact .section-title {
      color: var(--warm-white);
      max-width: 600px;
      margin: 0 auto 1.5rem;
    }

    .contact .section-title em { color: var(--carrot); }

    .contact-sub {
      font-size: 1rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 3rem;
      line-height: 1.7;
    }

    .contact-links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .contact-links .btn-primary {
      background: var(--carrot);
      border-color: var(--carrot);
    }

    .contact-links .btn-primary:hover {
      background: var(--gold);
      border-color: var(--gold);
    }

    .contact-links .btn-secondary {
      border-color: rgba(255,255,255,0.2);
      color: var(--warm-white);
    }

    .contact-links .btn-secondary:hover { border-color: var(--warm-white); }

    footer {
      background: var(--ink);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 2rem 5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
    }

    footer a {
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      transition: color 0.2s;
    }
